<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Login</title>
    <meta name="description" content="Cine Aurora - Login" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css"/>

  </head>

  <body>
    <header>
      <div class="div-header">
        <h1>Cine Aurora</h1>
        <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" class="img-header"/>
      </div>
      <div>
        <nav>
          <a href="../index.html" class="a-nav">Inicio</a>

        </nav>

    <main>
      <h2>Acceso Clientes</h2>
      <form action="perfil.html">
        <div class="div-acceso">
          <label>Email</label>
          <input type="email" required />
        </div>
        <div class="div-acceso">
          <label>Contraseña</label>
          <input type="password" required />
        </div>
        <button type="submit" class="button-ingresar">Ingresar</button>
        <p>¿No eres miembro? <a href="registro.html">Regístrate</a></p>
      </form>
    </main>

    <footer>

    </footer>

</html>
