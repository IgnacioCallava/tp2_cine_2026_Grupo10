<!--  Se modifico para separar en dos bloques -->

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Registro</title>
    <meta name="description" content="Cine Aurora - Registro" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/registro.css" />
  </head>

  <body>
    <header>
      <div class="div-header">
        <h1>Cine Aurora</h1>
        <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" class="img-header"/>
      </div>
      <div>
        <nav>
          <a href="../index.html" class="a-nav">Inicio</a>
          <a href="./estrenos.html" class="a-nav">Próximos estrenos</a>
          <a href="../index.html" class="a-nav">Volver</a>
        </nav>
      </div>
    </header>


    <main>
        <form action="login.html">
    <!-- Bloque 1: Crear nueva cuenta -->
          <div class="bloque cuenta">
            <h2>Crear nueva cuenta</h2>
          <div>
            <label>Nombre Completo</label>
            <input type="text" required />
          </div>
          <div>
            <label>Email</label>
            <input type="email" required />
          </div>
          <div>
            <label>Fecha de nacimiento</label>
            <input type="date" required />
          </div>
          <div>
            <label>Contraseña</label>
            <input type="password" required />
          </div>
          <div>
            <label>Confirmar contraseña</label>
            <input type="password" required />
          </div>
          <button type="submit">Regístrate</button>
        </div>

        <!-- Bloque 2: Datos para ayudar al cine -->
        <div class="bloque cine">
          <h2>Datos para ayudar al cine</h2>
          <p>Estos datos nos ayudan a mejorar tu experiencia.</p>

          <div>
            <label>Elegí tu color favorito para las butacas</label>
            <input type="color" />
          </div>

          <div>
            <label>¿Cuántas entradas comprás en general? Min: 0 | Max: 10</label>
            <input type="range" min="0" max="10" />
          </div>

          <div>
            <label>Seleccioná tu género favorito</label>
            <select>
              <option>Acción</option>
              <option>Drama</option>
              <option>Ciencia ficción</option>
              <option>Terror</option>
              <option>Comedia</option>
              <option>Romance</option>
            </select>
          </div>
        
          <!-- Modifico el div para poder usar grid y dejar los items ordenados, creando clase snacks -->
            <div>
                <label>Elegí tu snack favorito</label>
                <div class="snacks">
                  <input type="radio" name="snack" id="dulce" />
                  <label for="dulce">Pochoclo dulce</label>

                  <input type="radio" name="snack" id="salado" />
                  <label for="salado">Pochoclo salado</label>

                  <input type="radio" name="snack" id="choco" />
                  <label for="choco">Chocolate</label>

                  <input type="radio" name="snack" id="frutos" />
                  <label for="frutos">Frutos secos</label>
                </div>
              </div>


      <footer>
        <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
      </footer>
    </main>
